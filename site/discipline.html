<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>学科平均替代率</title><link rel="stylesheet" href="./style.css" /></head><body>
<div class="app-shell"><aside class="sidebar"><div class="brand-block"><div class="brand-title">中国专业 AI 替代率</div><div class="brand-sub">独立结果页，默认展示 adjusted_replace_rate。</div></div>
<section class="detail-block"><div class="panel-title">页面导航</div><div class="hint-text"><a href="./index.html" target="_blank" rel="noopener noreferrer">返回风险树图</a><br /><a href="./top20.html" target="_blank" rel="noopener noreferrer">Top 20 专业</a><br /><a href="./discipline.html" target="_blank" rel="noopener noreferrer">学科平均替代率</a></div></section>
<section class="legend-block"><span class="legend-chip"><i class="legend-dot" style="background:#1e7a40"></i>极安全</span><span class="legend-chip"><i class="legend-dot" style="background:#5aad3e"></i>低风险</span><span class="legend-chip"><i class="legend-dot" style="background:#a8c020"></i>中低</span><span class="legend-chip"><i class="legend-dot" style="background:#f0b323"></i>中高</span><span class="legend-chip"><i class="legend-dot" style="background:#f97316"></i>高风险</span><span class="legend-chip"><i class="legend-dot" style="background:#d7263d"></i>极高</span></section></aside>
<main class="main-area"><section class="toolbar-card" style="grid-template-columns:1fr auto;"><div><div class="card-title">学科平均替代率</div><div class="card-sub">按 adjusted_replace_rate 聚合学科均值，并保留原始均值。</div></div><div class="toolbar-meta" id="metaInfo">加载中…</div></section><section class="treemap-card" style="min-height:auto;"><div class="table-wrap" style="padding-top:8px;"><table><thead><tr><th>#</th><th>学科门类</th><th>调整后平均替代率</th><th>原始平均替代率</th><th>专业数</th></tr></thead><tbody id="disciplineBody"></tbody></table></div></section></main></div>
<script>
const RISK_COLORS = ['#1e7a40', '#5aad3e', '#a8c020', '#f0b323', '#f97316', '#d7263d'];
const RISK_LABELS = ['极安全', '低风险', '中低', '中高', '高风险', '极高'];
function pct(v){ return `${Math.round(Number(v || 0) * 100)}%`; }
function levelIndex(rate){ const v = Number(rate || 0); if (v < 0.20) return 0; if (v < 0.35) return 1; if (v < 0.50) return 2; if (v < 0.65) return 3; if (v < 0.80) return 4; return 5; }
function safeText(v, fallback='未分类'){ return (v ?? '').toString().trim() || fallback; }
function metricOf(row){ if (row && row.adjusted_replace_rate != null) return Number(row.adjusted_replace_rate || 0); return Number(row?.replace_rate || 0); }
function rawMetricOf(row){ if (row && row.raw_replace_rate != null) return Number(row.raw_replace_rate || 0); return Number(row?.replace_rate || 0); }

async function init(){
  const res = await fetch('./data/major_ai_rate.json');
  const rows = await res.json();
  const map = new Map();
  rows.forEach(row => {
    const key = safeText(row.discipline, '其他');
    if (!map.has(key)) map.set(key, { totalAdj: 0, totalRaw: 0, count: 0 });
    const item = map.get(key);
    item.totalAdj += metricOf(row);
    item.totalRaw += rawMetricOf(row);
    item.count += 1;
  });
  const data = [...map.entries()].map(([name, item]) => ({
    name,
    avgAdj: item.count ? item.totalAdj / item.count : 0,
    avgRaw: item.count ? item.totalRaw / item.count : 0,
    count: item.count
  })).sort((a,b)=>b.avgAdj-a.avgAdj);
  document.getElementById('metaInfo').textContent = `共 ${data.length.toLocaleString('zh-CN')} 个学科门类`;
  document.getElementById('disciplineBody').innerHTML = data.map((row,i)=>`
    <tr>
      <td>${i + 1}</td>
      <td>${row.name}</td>
      <td><span class="risk-badge level-${levelIndex(row.avgAdj) + 1}">${pct(row.avgAdj)}</span></td>
      <td>${pct(row.avgRaw)}</td>
      <td>${row.count}</td>
    </tr>`).join('');
}
init();</script></body></html>
