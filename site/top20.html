<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top 20 专业</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <div class="brand-title">中国专业 AI 替代率</div>
        <div class="brand-sub">独立结果页，延续主站深色风格。</div>
      </div>
      <section class="detail-block">
        <div class="panel-title">页面导航</div>
        <div class="hint-text">
          <a href="./index.html" target="_blank" rel="noopener noreferrer">返回风险树图</a><br />
          <a href="./top20.html" target="_blank" rel="noopener noreferrer">Top 20 专业</a><br />
          <a href="./discipline.html" target="_blank" rel="noopener noreferrer">学科平均替代率</a>
        </div>
      </section>
      <section class="legend-block">
        <span class="legend-chip"><i class="legend-dot" style="background:#1e7a40"></i>极安全</span>
        <span class="legend-chip"><i class="legend-dot" style="background:#5aad3e"></i>低风险</span>
        <span class="legend-chip"><i class="legend-dot" style="background:#a8c020"></i>中低</span>
        <span class="legend-chip"><i class="legend-dot" style="background:#f0b323"></i>中高</span>
        <span class="legend-chip"><i class="legend-dot" style="background:#f97316"></i>高风险</span>
        <span class="legend-chip"><i class="legend-dot" style="background:#d7263d"></i>极高</span>
      </section>
    </aside>
    <main class="main-area">
      <section class="toolbar-card" style="grid-template-columns:1fr auto;">
        <div>
          <div class="card-title">Top 20 专业</div>
          <div class="card-sub">按专业 AI 当前替代率从高到低排序。</div>
        </div>
        <div class="toolbar-meta" id="metaInfo">加载中…</div>
      </section>
      <section class="treemap-card" style="min-height:auto;">
        <div class="table-wrap" style="padding-top:8px;">
          
<table>
  <thead>
    <tr><th>#</th><th>专业</th><th>学科门类</th><th>专业类</th><th>替代率</th><th>岗位数</th><th>置信度</th></tr>
  </thead>
  <tbody id="top20Body"></tbody>
</table>

        </div>
      </section>
    </main>
  </div>
  <script>
    const RISK_COLORS = ['#1e7a40', '#5aad3e', '#a8c020', '#f0b323', '#f97316', '#d7263d'];
    function pct(v) { return `${Math.round(Number(v || 0) * 100)}%`; }
    function levelIndex(rate) {
      const v = Number(rate || 0);
      if (v < 0.20) return 0;
      if (v < 0.35) return 1;
      if (v < 0.50) return 2;
      if (v < 0.65) return 3;
      if (v < 0.80) return 4;
      return 5;
    }
    function safeText(v, fallback='未分类') { return (v ?? '').toString().trim() || fallback; }
    
async function init(){
  const res = await fetch('./data/major_ai_rate.json');
  const rows = await res.json();
  const top20 = [...rows].sort((a,b)=>(Number(b.replace_rate||0)-Number(a.replace_rate||0))).slice(0,20);
  document.getElementById('metaInfo').textContent = `共 ${rows.length.toLocaleString('zh-CN')} 个专业`;
  document.getElementById('top20Body').innerHTML = top20.map((row,i)=>`<tr>
    <td>${i+1}</td>
    <td>${safeText(row.major_name)}</td>
    <td>${safeText(row.discipline,'其他')}</td>
    <td>${safeText(row.major_category,'未分类')}</td>
    <td><span class="risk-badge level-${levelIndex(row.replace_rate)+1}">${pct(row.replace_rate)}</span></td>
    <td>${row.job_count ?? 0}</td>
    <td>${safeText(row.confidence,'low')}</td>
  </tr>`).join('');
}

    init();
  </script>
</body>
</html>
