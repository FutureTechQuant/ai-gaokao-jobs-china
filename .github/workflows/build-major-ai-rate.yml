name: build-major-ai-rate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "config/**"
      - "scripts/**"
      - ".github/workflows/build-major-ai-rate.yml"
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run pipeline
        run: |
          python scripts/normalize_majors.py
          python scripts/normalize_jobs.py
          python scripts/build_major_ai_rate.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: major-ai-rate
          path: output/

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "chore: update major ai rate"
          git push
